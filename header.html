<script>
  (function () {
    "use strict";

    const menuButton = document.getElementById("menuButton");
    const mobileCloseButton = document.getElementById("mobileCloseButton");
    const navLinks = document.getElementById("navLinks");
    const mobileMenuOverlay = document.getElementById("mobileMenuOverlay");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const cartButton = document.getElementById("cartButton");
    const cartCount = document.getElementById("cartCount");

    const CART_KEY = "rouhSweetCart";

    function getCartItems() {
      try {
        const storedCart = localStorage.getItem(CART_KEY);
        const cartItems = JSON.parse(storedCart || "[]");
        return Array.isArray(cartItems) ? cartItems : [];
      } catch (error) {
        console.error("Cart read error:", error);
        return [];
      }
    }

    function updateCartCount() {
      const cartItems = getCartItems();

      if (cartCount) {
        cartCount.textContent = cartItems.length;
      }
    }

    function openMobileMenu() {
      if (!navLinks || !menuButton || !mobileMenuOverlay) return;

      navLinks.classList.add("show");
      mobileMenuOverlay.classList.add("show");
      document.body.classList.add("menu-open");
      menuButton.setAttribute("aria-expanded", "true");
      menuButton.textContent = "×";
    }

    function closeMobileMenu() {
      if (!navLinks || !menuButton || !mobileMenuOverlay) return;

      navLinks.classList.remove("show");
      mobileMenuOverlay.classList.remove("show");
      document.body.classList.remove("menu-open");
      menuButton.setAttribute("aria-expanded", "false");
      menuButton.textContent = "☰";
    }

    function toggleMobileMenu() {
      if (!navLinks) return;

      const isOpen = navLinks.classList.contains("show");

      if (isOpen) {
        closeMobileMenu();
      } else {
        openMobileMenu();
      }
    }

    function setActiveLink() {
      if (!navLinks) return;

      const currentPage = window.location.pathname.split("/").pop() || "index.html";
      const links = navLinks.querySelectorAll("a");

      links.forEach(function (link) {
        link.classList.remove("active");

        const href = link.getAttribute("href") || "";

        if (currentPage === "contact.html" && href === "contact.html") {
          link.classList.add("active");
        }

        if ((currentPage === "index.html" || currentPage === "") && href === "index.html") {
          link.classList.add("active");
        }
      });
    }

    if (menuButton && navLinks) {
      menuButton.addEventListener("click", toggleMobileMenu);
    }

    if (mobileCloseButton) {
      mobileCloseButton.addEventListener("click", closeMobileMenu);
    }

    if (mobileMenuOverlay) {
      mobileMenuOverlay.addEventListener("click", closeMobileMenu);
    }

    if (navLinks) {
      navLinks.addEventListener("click", function (event) {
        if (event.target.tagName === "A") {
          closeMobileMenu();
        }
      });
    }

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeMobileMenu();
      }
    });

    if (searchForm && searchInput) {
      searchForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const keyword = searchInput.value.trim();

        if (keyword.length === 0) {
          alert("اكتب اسم المنتج أولاً");
          searchInput.focus();
          return;
        }

        const productsSection = document.getElementById("products");

        if (productsSection) {
          productsSection.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });

          window.dispatchEvent(new CustomEvent("searchProducts", {
            detail: {
              keyword: keyword
            }
          }));
        } else {
          sessionStorage.setItem("rouhSearchKeyword", keyword);
          window.location.href = "index.html#products";
        }
      });
    }

    if (cartButton) {
      cartButton.addEventListener("click", function () {
        const cartItems = getCartItems();

        if (cartItems.length === 0) {
          alert("السلة فارغة حالياً");
          return;
        }

        alert("عدد المنتجات في السلة: " + cartItems.length);
      });
    }

    window.addEventListener("cartChanged", updateCartCount);

    window.addEventListener("resize", function () {
      if (window.innerWidth > 980) {
        closeMobileMenu();
      }
    });

    setActiveLink();
    updateCartCount();
  })();
</script>
